name: Sincronizare cursuri ExchangeOnline -> Firebase

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Descarc codul
        uses: actions/checkout@v4

      - name: Instalez Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalez dependintele
        working-directory: ./rate-sync
        run: npm install

      - name: Rulez sincronizarea
        working-directory: ./rate-sync
        env:
          FIREBASE_CRED_HERMES: ${{ secrets.FIREBASE_CRED_HERMES }}
          FIREBASE_CRED_CENTRU: ${{ secrets.FIREBASE_CRED_CENTRU }}
        run: npm start
