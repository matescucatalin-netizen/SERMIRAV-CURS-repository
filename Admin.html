<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SERMIRAV — Admin Cursuri</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0a0a0a;
    font-family: 'Roboto Condensed', sans-serif;
    color: #fff;
    min-height: 100vh;
    padding: 20px 16px 40px;
  }

  .header {
    text-align: center;
    padding: 20px 0 24px;
    border-bottom: 1px solid rgba(201,168,76,0.3);
    margin-bottom: 24px;
  }
  .header h1 {
    font-family: 'Oswald', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: #C9A84C;
    letter-spacing: 3px;
  }
  .header p {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
    margin-top: 6px;
    text-transform: uppercase;
  }

  /* Password screen */
  #pwd-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 0;
  }
  .pwd-box {
    background: #111;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 16px;
    padding: 32px 24px;
    text-align: center;
    width: 100%;
    max-width: 320px;
  }
  .pwd-title {
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    color: #C9A84C;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .pwd-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    margin-bottom: 24px;
    letter-spacing: 1px;
  }
  .pwd-input {
    width: 100%;
    background: #000;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    color: #fff;
    font-size: 24px;
    padding: 14px;
    text-align: center;
    letter-spacing: 8px;
    margin-bottom: 16px;
    font-family: 'Oswald', sans-serif;
  }
  .pwd-input:focus { outline: none; border-color: #C9A84C; }
  .pwd-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #C9A84C, #a8832e);
    border: none;
    border-radius: 8px;
    color: #000;
    font-family: 'Oswald', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
  }
  .pwd-error {
    font-size: 12px;
    color: #f85149;
    margin-top: 10px;
    letter-spacing: 1px;
    min-height: 18px;
  }

  /* Admin panel */
  #admin-panel { display: none; }

  .section-title {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 4px;
    color: #C9A84C;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .col-headers {
    display: grid;
    grid-template-columns: 1.8fr 1fr 1fr;
    gap: 8px;
    padding: 6px 12px;
    margin-bottom: 4px;
  }
  .col-h {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    text-align: center;
  }
  .col-h:first-child { text-align: left; }
  .col-h.buy { color: #3fb950; }
  .col-h.sell { color: #C9A84C; }

  .currency-row {
    display: grid;
    grid-template-columns: 1.8fr 1fr 1fr;
    gap: 8px;
    align-items: center;
    padding: 10px 12px;
    background: rgba(255,255,255,0.03);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.06);
    margin-bottom: 8px;
  }

  .currency-name {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
  }
  .flag { font-size: 22px; }
  .code {
    font-size: 10px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 1px;
    display: block;
    margin-top: 1px;
  }

  .rate-input {
    background: #000;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    color: #fff;
    font-family: 'Oswald', sans-serif;
    font-size: 17px;
    font-weight: 600;
    padding: 10px 8px;
    text-align: center;
    width: 100%;
    letter-spacing: 0.5px;
    -webkit-appearance: none;
  }
  .rate-input:focus { outline: none; }
  .rate-input.buy:focus { border-color: #3fb950; background: rgba(63,185,80,0.05); }
  .rate-input.sell:focus { border-color: #C9A84C; background: rgba(201,168,76,0.05); }

  .save-btn {
    width: 100%;
    margin-top: 20px;
    padding: 16px;
    background: linear-gradient(135deg, #C9A84C, #a8832e);
    border: none;
    border-radius: 12px;
    color: #000;
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .save-btn:active { transform: scale(0.98); }
  .save-btn:disabled { opacity: 0.5; }

  .status-msg {
    text-align: center;
    margin-top: 14px;
    font-size: 14px;
    letter-spacing: 2px;
    min-height: 22px;
    font-weight: 700;
  }
  .status-msg.ok { color: #3fb950; }
  .status-msg.err { color: #f85149; }

  .logout-btn {
    width: 100%;
    margin-top: 24px;
    padding: 12px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: rgba(255,255,255,0.3);
    font-family: 'Roboto Condensed', sans-serif;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
  }

  .panou-link {
    display: block;
    text-align: center;
    margin-top: 16px;
    font-size: 12px;
    color: rgba(201,168,76,0.5);
    letter-spacing: 2px;
    text-decoration: none;
    text-transform: uppercase;
  }

  .last-update {
    text-align: center;
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 1px;
    margin-bottom: 20px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>SERMIRAV EXCHANGE</h1>
  <p>Panou Administrare Cursuri</p>
</div>

<!-- PASSWORD SCREEN -->
<div id="pwd-screen">
  <div class="pwd-box">
    <div class="pwd-title">🔐 Acces Admin</div>
    <div class="pwd-sub">Introduceți parola</div>
    <input type="password" class="pwd-input" id="pwd-input" placeholder="••••" maxlength="20">
    <button class="pwd-btn" onclick="checkPwd()">Intră</button>
    <div class="pwd-error" id="pwd-error"></div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel">
  <div class="last-update" id="last-update">Se încarcă cursurile...</div>

  <div class="section-title">Modifică Cursurile</div>

  <div class="col-headers">
    <div class="col-h">Valută</div>
    <div class="col-h buy">Cumpărăm</div>
    <div class="col-h sell">Vindem</div>
  </div>

  <div id="currency-rows"></div>

  <button class="save-btn" id="save-btn" onclick="saveRates()">
    💾 Salvează pe Panou
  </button>
  <div class="status-msg" id="status-msg"></div>

  <button class="logout-btn" onclick="logout()">Ieși din Admin</button>
  <a href="https://matescucatalin-netizen.github.io/SERMIRAV-CURS-repository/" target="_blank" class="panou-link">
    → Deschide Panoul LED
  </a>
</div>

<script>
const PASSWORD = '1234';
const JSONKEEPER_URL = 'https://jsonkeeper.com/b/6KQSA';

const CURRENCIES = [
  { flag:'🇪🇺', name:'Euro',             code:'EUR', buy:5.1260, sell:5.2100 },
  { flag:'🇺🇸', name:'Dolar american',   code:'USD', buy:4.3340, sell:4.4440 },
  { flag:'🇬🇧', name:'Lira sterlina',    code:'GBP', buy:5.8230, sell:6.0400 },
  { flag:'🇨🇭', name:'Franc elvețian',   code:'CHF', buy:5.5970, sell:5.7100 },
  { flag:'🇨🇦', name:'Dolar canadian',   code:'CAD', buy:3.0750, sell:3.3000 },
  { flag:'🇦🇺', name:'Dolar australian', code:'AUD', buy:2.7620, sell:3.1000 },
  { flag:'🇵🇱', name:'Zlot polonez',     code:'PLN', buy:1.1450, sell:1.2200 },
  { flag:'🇧🇬', name:'Leva bulgărească', code:'BGN', buy:2.2500, sell:2.6660 },
  { flag:'🇹🇷', name:'Liră turcească',   code:'TRY', buy:0.0950, sell:0.1190 },
  { flag:'🇭🇺', name:'Forint maghiar',   code:'HUF', buy:0.0130, sell:0.0141 },
];

function checkPwd() {
  const val = document.getElementById('pwd-input').value;
  if (val === PASSWORD) {
    document.getElementById('pwd-screen').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    loadRates();
    renderRows();
  } else {
    document.getElementById('pwd-error').textContent = '✕ Parolă incorectă';
    document.getElementById('pwd-input').value = '';
  }
}

document.getElementById('pwd-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPwd();
});

async function loadRates() {
  try {
    const res = await fetch(JSONKEEPER_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error();
    const data = await res.json();
    if (data.rates && data.rates.length > 0) {
      data.rates.forEach(r => {
        const idx = CURRENCIES.findIndex(c => c.code === r.code);
        if (idx >= 0) {
          CURRENCIES[idx].buy = r.buy;
          CURRENCIES[idx].sell = r.sell;
        }
      });
      const now = new Date();
      document.getElementById('last-update').textContent =
        'Ultima salvare: ' + now.toLocaleTimeString('ro-RO');
      renderRows();
    } else {
      document.getElementById('last-update').textContent = 'Cursuri implicite';
    }
  } catch(e) {
    document.getElementById('last-update').textContent = 'Nu s-au putut încărca cursurile salvate';
  }
}

function renderRows() {
  const container = document.getElementById('currency-rows');
  container.innerHTML = '';
  CURRENCIES.forEach((c, i) => {
    const row = document.createElement('div');
    row.className = 'currency-row';
    row.innerHTML = `
      <div class="currency-name">
        <span class="flag">${c.flag}</span>
        <div>
          <span>${c.name}</span>
          <span class="code">${c.code}</span>
        </div>
      </div>
      <input type="number" class="rate-input buy" id="buy-${i}"
             value="${c.buy.toFixed(4)}" step="0.0001" min="0" inputmode="decimal">
      <input type="number" class="rate-input sell" id="sell-${i}"
             value="${c.sell.toFixed(4)}" step="0.0001" min="0" inputmode="decimal">
    `;
    container.appendChild(row);
  });
}

async function saveRates() {
  const btn = document.getElementById('save-btn');
  const msg = document.getElementById('status-msg');
  btn.disabled = true;
  btn.textContent = '⏳ Se salvează...';
  msg.textContent = '';
  msg.className = 'status-msg';

  const newRates = CURRENCIES.map((c, i) => ({
    code: c.code,
    buy: parseFloat(document.getElementById('buy-' + i).value) || c.buy,
    sell: parseFloat(document.getElementById('sell-' + i).value) || c.sell,
  }));

  try {
    const res = await fetch(JSONKEEPER_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ rates: newRates })
    });

    if (res.ok) {
      newRates.forEach((r, i) => {
        CURRENCIES[i].buy = r.buy;
        CURRENCIES[i].sell = r.sell;
      });
      const now = new Date();
      document.getElementById('last-update').textContent =
        'Salvat la: ' + now.toLocaleTimeString('ro-RO');
      msg.textContent = '✓ CURSURI SALVATE! Panoul se actualizează în 30 sec.';
      msg.className = 'status-msg ok';
    } else {
      throw new Error();
    }
  } catch(e) {
    msg.textContent = '✕ Eroare — încearcă din nou';
    msg.className = 'status-msg err';
  }

  btn.disabled = false;
  btn.textContent = '💾 Salvează pe Panou';
  setTimeout(() => { msg.textContent = ''; msg.className = 'status-msg'; }, 5000);
}

function logout() {
  document.getElementById('admin-panel').style.display = 'none';
  document.getElementById('pwd-screen').style.display = 'flex';
  document.getElementById('pwd-input').value = '';
}
</script>
</body>
</html>
