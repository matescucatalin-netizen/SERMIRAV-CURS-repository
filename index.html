<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<style>
:root { --bg: #000; --gold: #FFD700; --green: #00FF55; --white: #FFF; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--bg); font-family: 'Oswald', sans-serif; overflow:hidden; }

/* DESIGN MĂRIT */
.header { padding: 1.5vh 4vw; border-bottom: 4px solid var(--gold); text-align: center; }
.logo-main { font-size: 10vw; font-weight: 900; color: var(--white); text-transform: uppercase; }
.logo-sub { font-size: 6vw; font-weight: 900; color: var(--gold); letter-spacing: 4px; text-transform: uppercase; margin-top: 0.5vh; }
.col-headers { display:grid; grid-template-columns: 28% 36% 36%; padding: 1.5vh 4vw; background:#111; }
.col-h { font-size: 4vw; font-weight: 900; color: var(--white); text-transform: uppercase; text-align: center; }
.col-h-en { font-size: 2.5vw; font-weight: 700; color: var(--gold); }
.rates-table { padding: 1vh 4vw; }
.rate-row { display:grid; grid-template-columns: 28% 36% 36%; align-items:center; border-bottom:1px solid #222; padding: 1.5vh 0; }
.currency-code { font-size: 11vw; font-weight: 900; color: var(--white); }
.rate-val { font-size: 13vw; font-weight: 900; transform: scale(0.9, 1.5); text-align: center; }
.rate-val.buy { color: var(--green); }
.rate-val.sell { color: var(--white); }
.divider-title { font-size: 9vw; font-weight: 900; color: var(--gold); text-align: center; padding: 2vh 0; border-top: 4px solid var(--gold); border-bottom: 4px solid var(--gold); }
.amanet-container { padding: 2vh 4vw; display: flex; flex-direction: column; gap: 2vh; }
.amanet-card { display:flex; justify-content:space-between; align-items:center; background: #111; padding: 2.5vh 4vw; border-radius: 15px; border: 2px solid #333; }
.amanet-metal { font-size: 8vw; font-weight: 900; color: var(--white); }
.amanet-price { font-size: 10vw; font-weight: 900; color: var(--gold); }

/* ADMIN UI */
.admin-btn { position:fixed; bottom:0; right:0; width:40px; height:40px; background:transparent; border:none; z-index:9999; }
#admin-panel { display:none; position:fixed; inset:0; background:#000; z-index:8888; padding:20px; color:#fff; }
.adm-input { font-size:20px; padding:10px; width:100%; margin-bottom:10px; }
</style>
</head>
<body>

<div class="header">
    <div class="logo-main">SERMIRAV HERMES</div>
    <div class="logo-sub">SCHIMB VALUTAR</div>
</div>

<div class="col-headers">
    <div class="col-h">Valută</div>
    <div class="col-h">CUMPĂRĂM<div class="col-h-en">WE BUY</div></div>
    <div class="col-h">VINDEM<div class="col-h-en">WE SELL</div></div>
</div>

<div class="rates-table" id="ratesTable"></div>

<div class="divider-title">AMANET AUR</div>

<div class="amanet-container">
    <div class="amanet-card">
        <div class="amanet-metal">AUR 14K</div>
        <div class="amanet-price" id="gold-14">310 LEI/G</div>
    </div>
    <div class="amanet-card">
        <div class="amanet-metal">AUR 18K</div>
        <div class="amanet-price" id="gold-18">370 LEI/G</div>
    </div>
</div>

<button class="admin-btn" onclick="checkAuth()"></button>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = { apiKey:"AIzaSyD7K-y9cX-fPbpGOetaCTwe8G8gpMy-ML0", authDomain:"sermirav-exchange.firebaseapp.com", databaseURL:"https://sermirav-exchange-default-rtdb.europe-west1.firebasedatabase.app", projectId:"sermirav-exchange", storageBucket:"sermirav-exchange.firebasestorage.app", messagingSenderId:"913088674029", appId:"1:913088674029:web:8c3a77e3c5f5925a7fb4e4" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function checkAuth() {
    const p = prompt("Introduceți parola:");
    if(p === "2580") {
        const val = prompt("Modifică Curs (ex: EUR,5.12,5.20):");
        if(val) {
            const [code, buy, sell] = val.split(',');
            db.ref('rates').push({code, buy: parseFloat(buy), sell: parseFloat(sell)});
            location.reload();
        }
    }
}

// Logica de randare rămâne activă...
// (Sistemul preia datele din Firebase în mod automat)
</script>
</body>
</html>
