<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SERMIRAV EXCHANGE HERMES</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg-main: #000000;       /* Negru pur pentru contrast maxim pe LED */
  --accent-gold: #FFD700;   /* Aur galben intens, stralucitor */
  --green-buy: #00FF55;    /* Verde neon ultra-vizibil */
  --white-sell: #FFFFFF;    /* Alb pur pentru lizibilitate */
  --text-muted: #888888;    /* Gri pentru texte secundare */
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background: var(--bg-main); font-family: 'Oswald', sans-serif; }
#display { width:100vw; height:100vh; display:flex; flex-direction:column; background: var(--bg-main); }

/* HEADER ULTRA-PROFI - CORPORATE STYLE */
.header { 
  display:flex; 
  flex-direction:column; 
  align-items:center; 
  justify-content:center; 
  padding: 1.5vh 5vw 1vh 5vw; 
  border-bottom: 2px solid #151515; 
  flex-shrink:0; 
  background: #000; 
}
.logo-main {
  font-size: 7.8vw;
  font-weight: 900;
  letter-spacing: 2px;
  line-height: 1;
  text-transform: uppercase;
  text-align: center;
}
.logo-gold { color: var(--accent-gold); }
.logo-white { color: #FFFFFF; margin-left: 10px; }

.logo-sub { 
  font-size: 2.2vw; 
  font-weight: 700; 
  color: var(--text-muted); 
  letter-spacing: 5px; 
  text-transform: uppercase; 
  text-align: center; 
  margin-top: 0.8vh; 
}

/* COLOANE ANTET - CURATE ȘI RIDICATE */
.col-headers { 
  display:grid; 
  grid-template-columns: 24% 38% 38%; 
  padding: 0.8vh 5vw; 
  border-bottom: 3px solid #151515; 
  background:#050505; 
  flex-shrink:0; 
  align-items: center;
}
.col-h { font-size:4vw; font-weight:900; letter-spacing:1px; text-transform:uppercase; text-align:center; line-height:1; }
.col-h:first-child { text-align:left; color: var(--text-muted); font-size: 3.3vw;}
.col-h.buy { color: var(--green-buy); }
.col-h.sell { color: var(--white-sell); }
.col-h-en { font-size:1.9vw; font-weight:700; letter-spacing:1px; text-transform:uppercase; text-align:center; display:block; margin-top: 2px;}

/* TABEL CURSURI VALUTARE - OPTIMIZAT PENTRU ÎNĂLȚIME */
.rates-table { 
  flex:1; 
  display:flex; 
  flex-direction:column; 
  padding: 0 5vw; 
  background: var(--bg-main); 
  justify-content: space-around; 
}
.rate-row { 
  display:grid; 
  grid-template-columns: 24% 38% 38%; 
  align-items:center; 
  flex:1; 
  border-bottom:1px solid #111; 
}
.rate-row:last-child { border-bottom:none; }
.rate-row:nth-child(even) { background:#030303; }

.currency-cell { text-align: left; }
.currency-code { font-size:7.5vw; font-weight:900; color:#FFFFFF; letter-spacing:1px; line-height:1; }

.rate-cell { text-align:center; width: 100%; }

/* CIFRE MODIFICATE: ULTRA-ÎNALTE ȘI COLOOSALE PE VERTICALĂ */
.rate-val { 
  font-size: 14.5vw;          /* Font mărit considerabil */
  font-weight: 900; 
  display: block; 
  line-height: 0.9; 
  letter-spacing: -0.5px;
  transform: scaleY(1.18);    /* Efect de întindere în sus (înălțime maximă) */
  transform-origin: center;
}
.rate-val.buy { color: var(--green-buy); }
.rate-val.sell { color: var(--white-sell); }

/* SECTIUNE DELIMITATOR "AMANET AUR" - MASIVĂ ȘI CURATĂ */
.divider-section {
  display: flex;
  align-items: center;
  justify-content: center;
  background: #050505;
  border-top: 3px solid var(--accent-gold);
  border-bottom: 3px solid var(--accent-gold);
  padding: 1.4vh 0;
  flex-shrink: 0;
}
.divider-title {
  font-size: 7.5vw; 
  font-weight: 900;
  color: var(--accent-gold);
  letter-spacing: 6px;
  text-transform: uppercase;
  line-height: 1;
}

/* SECTIUNE AMANET AUR JOS */
.amanet-bar { 
  background: #000000; 
  flex-shrink:0; 
  padding: 1.8vh 5vw 2.8vh 5vw; 
}
.amanet-container { 
  display: flex; 
  flex-direction: column; 
  gap: 1.5vh; 
}

/* Casete premium cu contur auriu solid */
.amanet-card { 
  display:flex; 
  justify-content:space-between; 
  align-items:center; 
  background: #000000; 
  border: 3px solid var(--accent-gold); 
  padding: 2.2vh 5vw; 
  border-radius: 12px; 
}

.amanet-metal { 
  font-size: 7.2vw; 
  font-weight: 900; 
  color: #FFFFFF; 
  letter-spacing: 1px; 
  text-transform: uppercase; 
}

.amanet-price-box { 
  display: flex; 
  flex-direction: column;
  align-items: flex-end; 
  justify-content: center;
}
.amanet-label-mic { 
  font-size: 3vw; 
  font-weight: 700; 
  color: var(--text-muted); 
  text-transform: uppercase; 
  letter-spacing: 1px; 
  line-height: 1;
  margin-bottom: 4px;
}
.amanet-price { 
  font-size: 10.5vw; /* Mărit subtil pentru impact vizual maxim jos */
  font-weight: 900; 
  color: var(--accent-gold); 
  line-height: 1; 
}

/* ADMIN SYSTEM (Ascuns) */
.admin-btn { position:fixed; bottom:8px; right:8px; width:22px; height:22px; background:transparent; border:none; color:rgba(255,255,255,0.01); font-size:14px; font-weight:900; cursor:pointer; z-index:999; user-select:none; }
#pwd-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.98); z-index:2000; justify-content:center; align-items:center; }
#pwd-overlay.show { display:flex; }
.pwd-box { background:#111; border:3px solid var(--accent-gold); border-radius:16px; padding:40px; text-align:center; width:320px; }
.pwd-title { font-size:22px; color: var(--accent-gold); text-transform:uppercase; font-weight:900; margin-bottom:8px; }
.pwd-sub { font-size:12px; color:#666; margin-bottom:20px; font-family:sans-serif; }
.pwd-input { width:100%; background:#000; border:2px solid var(--accent-gold); border-radius:8px; color:#FFFFFF; font-size:26px; padding:10px; text-align:center; letter-spacing:8px; margin-bottom:14px; font-weight:700; }
.pwd-input:focus { outline:none; }
.pwd-btn { width:100%; padding:12px; background: var(--accent-gold); border:none; border-radius:8px; color:#000; font-size:16px; font-weight:900; letter-spacing:3px; text-transform:uppercase; cursor:pointer; }
.pwd-error { font-size:13px; color:#FF4D4D; margin-top:8px; font-weight:700; min-height:18px; font-family:sans-serif; }
.pwd-cancel { background:none; border:none; color:#666; font-size:11px; letter-spacing:2px; text-transform:uppercase; cursor:pointer; margin-top:12px; font-weight:700; }

#admin { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.98); z-index:1000; overflow-y:auto; padding:20px 16px; }
.admin-panel { max-width:560px; margin:0 auto; background:#111; border-radius:14px; border:2px solid var(--accent-gold); overflow:hidden; }
.admin-header { background:#050505; padding:16px 24px; border-bottom:2px solid var(--accent-gold); display:flex; justify-content:space-between; align-items:center; }
.admin-title { font-size:20px; font-weight:900; color: var(--accent-gold); letter-spacing:2px; }
.admin-close { background: var(--accent-gold); border:none; color:#000; width:32px; height:32px; border-radius:50%; cursor:pointer; font-size:16px; font-weight:900; }
.admin-body { padding:16px 24px; }
.admin-row-header { display:grid; grid-template-columns:1.8fr 1fr 1fr; gap:8px; padding:4px 10px; margin-bottom:6px; }
.admin-col-label { font-size:11px; font-weight:900; letter-spacing:3px; text-transform:uppercase; text-align:center; color:#666; }
.admin-col-label:first-child { text-align:left; color: var(--accent-gold); }
.admin-row { display:grid; grid-template-columns:1.8fr 1fr 1fr; gap:8px; align-items:center; margin-bottom:8px; padding:10px 12px; background:#000; border-radius:8px; border:1px solid #222; }
.admin-currency-name { display:flex; align-items:center; gap:10px; font-size:15px; font-weight:900; color:#FFFFFF; letter-spacing:1px; }
.admin-input { background:#111; border:2px solid var(--accent-gold); border-radius:6px; color:#FFFFFF; font-size:16px; font-weight:700; padding:8px; text-align:center; width:100%; }
.admin-input:focus { outline:none; }
.admin-save-btn { width:100%; margin-top:16px; padding:14px; background: var(--accent-gold); border:none; border-radius:10px; color:#000; font-size:16px; font-weight:900; letter-spacing:3px; text-transform:uppercase; cursor:pointer; }
.admin-save-btn:disabled { opacity:0.4; }
.save-confirm { text-align:center; margin-top:10px; font-size:14px; letter-spacing:2px; opacity:0; transition:opacity 0.3s; min-height:20px; font-weight:900; }
.save-confirm.show { opacity:1; }
.save-confirm.ok { color: var(--green-buy); }
.save-confirm.err { color:#FF4D4D; }
</style>
</head>
<body>

<div id="pwd-overlay">
  <div class="pwd-box">
    <div class="pwd-title">Admin Access</div>
    <div class="pwd-sub">Introduceți parola</div>
    <input type="password" class="pwd-input" id="pwd-input" placeholder="••••" maxlength="20">
    <button class="pwd-btn" onclick="checkPassword()">Intră</button>
    <div class="pwd-error" id="pwd-error"></div><br>
    <button class="pwd-cancel" onclick="closePwd()">Anulează</button>
  </div>
</div>

<div id="display">
  <!-- LOGO PREMIUM - STYLE CORPORATE FINANCIAR -->
  <div class="header">
    <div class="logo-main">
      <span class="logo-gold">SERMIRAV</span><span class="logo-white">HERMES</span>
    </div>
    <div class="logo-sub">SCHIMB VALUTAR &nbsp;•&nbsp; BIJUTERIE &nbsp;•&nbsp; AMANET</div>
  </div>

  <div class="col-headers">
    <div class="col-h">VALUTĂ</div>
    <div style="text-align:center;">
      <div class="col-h buy">CUMPĂRĂM</div>
      <div class="col-h-en" style="color: var(--green-buy)">(We buy)</div>
    </div>
    <div style="text-align:center;">
      <div class="col-h sell">VINDEM</div>
      <div class="col-h-en" style="color: var(--white-sell)">(We sell)</div>
    </div>
  </div>

  <div class="rates-table" id="ratesTable"></div>

  <!-- DELIMITATOR CURAT ȘI MASIV - FĂRĂ EMOJI -->
  <div class="divider-section">
    <div class="divider-title">AMANET AUR</div>
  </div>

  <!-- SECTIUNE AMANET AUR JOS -->
  <div class="amanet-bar">
    <div class="amanet-container">
      
      <div class="amanet-card">
        <div class="amanet-metal">AUR 14K</div>
        <div class="amanet-price-box">
          <span class="amanet-label-mic">până la</span>
          <span class="amanet-price">310 LEI/G</span>
        </div>
      </div>

      <div class="amanet-card">
        <div class="amanet-metal">AUR 18K</div>
        <div class="amanet-price-box">
          <span class="amanet-label-mic">până la</span>
          <span class="amanet-price">370 LEI/G</span>
        </div>
      </div>

    </div>
  </div>
</div>

<button class="admin-btn" onclick="openPwd()">S</button>

<div id="admin">
  <div class="admin-panel">
    <div class="admin-header">
      <div class="admin-title">Modifică Cursuri</div>
      <button class="admin-close" onclick="closeAdmin()">✕</button>
    </div>
    <div class="admin-body">
      <div class="admin-row-header">
        <div class="admin-col-label">Valută</div>
        <div class="admin-col-label" style="color: var(--green-buy)">Cumpărăm</div>
        <div class="admin-col-label" style="color:#FFFFFF">Vindem</div>
      </div>
      <div id="adminRows"></div>
      <button class="admin-save-btn" id="adminSaveBtn" onclick="saveRates()">✓ Salvează Cursurile</button>
      <div class="save-confirm" id="saveConfirm"></div>
    </div>
  </div>
</div>

<!-- FIREBASE COMPAT CLASIC -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = { apiKey:"AIzaSyD7K-y9cX-fPbpGOetaCTwe8G8gpMy-ML0", authDomain:"sermirav-exchange.firebaseapp.com", databaseURL:"https://sermirav-exchange-default-rtdb.europe-west1.firebasedatabase.app", projectId:"sermirav-exchange", storageBucket:"sermirav-exchange.firebasestorage.app", messagingSenderId:"913088674029", appId:"1:913088674029:web:8c3a77e3c5f5925a7fb4e4" };

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const ratesRef = db.ref('rates');

const ADMIN_PASSWORD = '2580';
const NAMES = { EUR:'Euro', USD:'Dolar American', GBP:'Lira Sterlina', CHF:'Franc Elvetian', CAD:'Dolar Canadian', AUD:'Dolar Australian', PLN:'Zlot Polonez', TRY:'Lira Turceasca', HUF:'Forint Maghiar' };
let CURRENCIES = [ {code:'EUR',buy:5.1260,sell:5.2100},{code:'USD',buy:4.3340,sell:4.4440},{code:'GBP',buy:5.8230,sell:6.0400},{code:'CHF',buy:5.5970,sell:5.7100},{code:'CAD',buy:3.0750,sell:3.3000},{code:'AUD',buy:2.7620,sell:3.1000},{code:'PLN',buy:1.1450,sell:1.2200},{code:'TRY',buy:0.0950,sell:0.1190},{code:'HUF',buy:0.0130,sell:0.0141} ];

async function fetchRates() { 
  try { 
    const snapshot = await ratesRef.once('value'); 
    const data = snapshot.val(); 
    if (data && Array.isArray(data)) { 
      data.forEach(r => { 
        const idx = CURRENCIES.findIndex(c => c.code === r.code); 
        if (idx >= 0) { 
          CURRENCIES[idx].buy = r.buy; 
          CURRENCIES[idx].sell = r.sell; 
          const b = document.getElementById('buy-'+idx); 
          const s = document.getElementById('sell-'+idx); 
          if (b) b.textContent = r.buy.toFixed(4); 
          if (s) s.textContent = r.sell.toFixed(4); 
        } 
      }); 
    } 
  } catch(e) { console.error(e); } 
}

let secretBuffer = '', secretTimer = null;
document.addEventListener('keydown', function(e) { 
  if (e.target.tagName === 'INPUT') return; 
  secretBuffer += e.key; 
  if (secretTimer) clearTimeout(secretTimer); 
  secretTimer = setTimeout(() => { secretBuffer = ''; }, 2000); 
  if (secretBuffer.includes('2580')) { 
    secretBuffer = ''; 
    renderAdmin(); 
    document.getElementById('admin').style.display = 'block'; 
  } 
});

function renderDisplay() { 
  const table = document.getElementById('ratesTable'); 
  table.innerHTML = ''; 
  CURRENCIES.forEach((c, i) => { 
    const row = document.createElement('div'); 
    row.className = 'rate-row'; 
    row.innerHTML = `
      <div class="currency-cell"><div class="currency-code">${c.code}</div></div>
      <div class="rate-cell"><span class="rate-val buy" id="buy-${i}">${c.buy.toFixed(4)}</span></div>
      <div class="rate-cell"><span class="rate-val sell" id="sell-${i}">${c.sell.toFixed(4)}</span></div>
    `; 
    table.appendChild(row); 
  }); 
}

function renderAdmin() { 
  const container = document.getElementById('adminRows'); 
  container.innerHTML = ''; 
  CURRENCIES.forEach((c, i) => { 
    const row = document.createElement('div'); 
    row.className = 'admin-row'; 
    row.innerHTML = `<div class="admin-currency-name"><span>${c.code} · ${NAMES[c.code]}</span></div><input type="number" class="admin-input" id="adm-buy-${i}" value="${c.buy.toFixed(4)}" step="0.0001" min="0"><input type="number" class="admin-input" id="adm-sell-${i}" value="${c.sell.toFixed(4)}" step="0.0001" min="0">`; 
    container.appendChild(row); 
  }); 
}

window.saveRates = async function() { 
  const btn = document.getElementById('adminSaveBtn'); 
  const confirmEl = document.getElementById('saveConfirm'); 
  btn.disabled = true; 
  btn.textContent = '⏳ Se salvează...'; 
  const newRates = CURRENCIES.map((c, i) => ({ 
    code: c.code, 
    buy: parseFloat(document.getElementById('adm-buy-'+i).value)||c.buy, 
    sell: parseFloat(document.getElementById('adm-sell-'+i).value)||c.sell 
  })); 
  try { 
    await ratesRef.set(newRates); 
    confirmEl.textContent = '✓ CURSURI SALVATE!'; 
    confirmEl.className = 'save-confirm show ok'; 
  } catch(e) { 
    confirmEl.textContent = '✕ Eroare: '+e.message; 
    confirmEl.className = 'save-confirm show err'; 
  } 
  btn.disabled = false; 
  btn.textContent = '✓ Salvează Cursurile'; 
  setTimeout(()=>confirmEl.classList.remove('show'), 5000); 
};

window.openPwd = function() { 
  document.getElementById('pwd-input').value=''; 
  document.getElementById('pwd-error').textContent=''; 
  document.getElementById('pwd-overlay').classList.add('show'); 
};
window.closePwd = function() { document.getElementById('pwd-overlay').classList.remove('show'); };
window.checkPassword = function() { 
  if (document.getElementById('pwd-input').value === ADMIN_PASSWORD) { 
    window.closePwd(); 
    renderAdmin(); 
    document.getElementById('admin').style.display='block'; 
  } else { 
    document.getElementById('pwd-error').textContent='✕ Parolă incorectă'; 
    document.getElementById('pwd-input').value=''; 
  } 
};
window.closeAdmin = function() { document.getElementById('admin').style.display='none'; };
document.addEventListener('keydown', e => { 
  if (e.key==='Enter' && document.getElementById('pwd-overlay').classList.contains('show')) window.checkPassword(); 
  if (e.key==='Escape') { window.closePwd(); window.closeAdmin(); } 
});

renderDisplay();
fetchRates();
setInterval(fetchRates, 30000);
</script>
</body>
</html>
