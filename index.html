<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SERMIRAV EXCHANGE HERMES</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg-main: #000000;
  --accent-gold: #FFD700;
  --green-buy: #00FF55;
  --white-sell: #FFFFFF;
  --text-muted: #888888;
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background: var(--bg-main); font-family: 'Oswald', sans-serif; }
#display { width:100vw; height:100vh; display:flex; flex-direction:column; background: var(--bg-main); }

/* HEADER */
.header { display:flex; flex-direction:column; align-items:center; justify-content:center; padding: 1.2vh 4vw 0.8vh 4vw; border-bottom: 3px solid var(--accent-gold); flex-shrink:0; background: #000; }
.logo-main { font-size: 7.5vw; font-weight: 900; letter-spacing: 2px; line-height: 1; text-transform: uppercase; text-align: center; }
.logo-gold { color: var(--accent-gold); }
.logo-white { color: #FFFFFF; margin-left: 12px; }
.logo-sub { font-size: 5vw; font-weight: 900; color: var(--accent-gold); letter-spacing: 6px; text-transform: uppercase; text-align: center; margin-top: 0.4vh; }

/* ANTET COLOANE */
.col-headers { display:grid; grid-template-columns: 28% 36% 36%; padding: 0.6vh 4vw; border-bottom: 3px solid #151515; background:#050505; flex-shrink:0; align-items: center; }
.col-h { font-size: 3.5vw; font-weight: 900; text-transform: uppercase; color: #FFFFFF; display: block; }
.col-h-en { font-size: 2.2vw; font-weight: 700; text-transform: uppercase; color: var(--text-muted); line-height: 1; margin-top: 2px; }
.col-h-group { display: flex; flex-direction: column; align-items: center; justify-content: center; }

/* TABEL */
.rates-table { flex:1; display:flex; flex-direction:column; padding: 0 4vw; background: var(--bg-main); justify-content: space-around; }
.rate-row { display:grid; grid-template-columns: 28% 36% 36%; align-items:center; flex:1; border-bottom:1px solid #111; }
.currency-cell { display: flex; align-items: center; justify-content: flex-start; }
.currency-badge { background: #111; border-left: 5px solid var(--accent-gold); padding: 0.3vh 2vw; border-radius: 4px; }
.currency-code { font-size: 9.5vw; font-weight: 900; color: #FFFFFF; line-height: 1; }

.rate-cell { text-align: center; }
/* Mutare cifre cumpărare mai spre stânga (spre cod) */
.rate-cell.buy-col { text-align: left; padding-left: 2vw; }

.rate-val { font-size: 13.5vw; font-weight: 900; display: inline-block; line-height: 1; transform: scale(0.9, 1.55); transform-origin: center; }
.rate-val.buy { color: var(--green-buy); }
.rate-val.sell { color: var(--white-sell); }

/* AMANET */
.divider-section { display: flex; align-items: center; justify-content: center; background: #050505; border-top: 3px solid var(--accent-gold); border-bottom: 3px solid var(--accent-gold); padding: 0.8vh 0; flex-shrink: 0; }
.divider-title { font-size: 8vw; font-weight: 900; color: var(--accent-gold); letter-spacing: 4px; text-transform: uppercase; }
.amanet-bar { background: #000000; flex-shrink:0; padding: 1vh 4vw; }
.amanet-container { display: flex; flex-direction: column; gap: 0.5vh; }
.amanet-card { display:flex; justify-content:space-between; align-items:center; background: #050505; border: 2px solid #222; padding: 0.6vh 3vw; border-radius: 12px; }
.amanet-metal { font-size: 6.5vw; font-weight: 900; color: #FFFFFF; text-transform: uppercase; }
.amanet-price-box { background: var(--accent-gold); padding: 0.4vh 3vw; border-radius: 8px; text-align: right; }
.amanet-price { font-size: 8vw; font-weight: 900; color: #000000; line-height: 1; }

/* ADMIN (neschimbat) */
.admin-btn { position:fixed; bottom:8px; right:8px; color:rgba(255,255,255,0.01); cursor:pointer; z-index:999; }
</style>
</head>
<body>

<div id="display">
  <div class="header">
    <div class="logo-main"><span class="logo-gold">SERMIRAV</span><span class="logo-white">HERMES</span></div>
    <div class="logo-sub">SCHIMB VALUTAR</div>
  </div>

  <div class="col-headers">
    <div class="col-h">VALUTĂ</div>
    <div class="col-h-group"><span class="col-h">CUMPĂRĂM</span><span class="col-h-en">WE BUY</span></div>
    <div class="col-h-group"><span class="col-h">VINDEM</span><span class="col-h-en">WE SELL</span></div>
  </div>

  <div class="rates-table" id="ratesTable"></div>

  <div class="divider-section"><div class="divider-title">AMANET AUR</div></div>

  <div class="amanet-bar">
    <div class="amanet-container">
      <div class="amanet-card">
        <div class="amanet-metal">AUR 14K</div>
        <div class="amanet-price-box"><span class="amanet-price" id="gold-14">310 LEI/G</span></div>
      </div>
      <div class="amanet-card">
        <div class="amanet-metal">AUR 18K</div>
        <div class="amanet-price-box"><span class="amanet-price" id="gold-18">370 LEI/G</span></div>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = { apiKey:"AIzaSyD7K-y9cX-fPbpGOetaCTwe8G8gpMy-ML0", authDomain:"sermirav-exchange.firebaseapp.com", databaseURL:"https://sermirav-exchange-default-rtdb.europe-west1.firebasedatabase.app", projectId:"sermirav-exchange", storageBucket:"sermirav-exchange.firebasestorage.app", messagingSenderId:"913088674029", appId:"1:913088674029:web:8c3a77e3c5f5925a7fb4e4" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let CURRENCIES = [ {code:'EUR',buy:5.1260,sell:5.2100},{code:'USD',buy:4.3340,sell:4.4440},{code:'GBP',buy:5.8230,sell:6.0400},{code:'CHF',buy:5.5970,sell:5.7100},{code:'CAD',buy:3.0750,sell:3.3000},{code:'AUD',buy:2.7620,sell:3.1000},{code:'PLN',buy:1.1450,sell:1.2200},{code:'TRY',buy:0.0950,sell:0.1190},{code:'HUF',buy:0.0130,sell:0.0141} ];

function renderDisplay() { 
  const table = document.getElementById('ratesTable'); 
  table.innerHTML = ''; 
  CURRENCIES.forEach((c, i) => { 
    const row = document.createElement('div'); 
    row.className = 'rate-row'; 
    row.innerHTML = `
      <div class="currency-cell"><div class="currency-badge"><span class="currency-code">${c.code}</span></div></div>
      <div class="rate-cell buy-col"><span class="rate-val buy" id="buy-${i}">${c.buy.toFixed(4)}</span></div>
      <div class="rate-cell"><span class="rate-val sell" id="sell-${i}">${c.sell.toFixed(4)}</span></div>
    `; 
    table.appendChild(row); 
  }); 
}
renderDisplay();
</script>
</body>
</html>
