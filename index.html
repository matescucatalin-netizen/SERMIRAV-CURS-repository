<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SERMIRAV EXCHANGE HERMES</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-main: #0B0C10;
  --bg-surface: #171923;
  --bg-surface-alt: #1F2232;
  --accent-gold: #D4AF37;
  --accent-gold-hover: #F3E5AB;
  --green-buy: #00E676;
  --white-sell: #FFFFFF;
  --text-muted: #A0AEC0;
  --border-color: #2D3748;
}

* { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
html, body { width:100%; height:100%; overflow:hidden; background: var(--bg-main); color: #FFFFFF; }
#display { width:100vw; height:100vh; display:flex; flex-direction:column; background: var(--bg-main); }

/* HEADER */
.header { 
  display:flex; 
  flex-direction:column; 
  align-items:center; 
  justify-content:center; 
  padding:2vh 2vw; 
  border-bottom: 2px solid var(--border-color); 
  flex-shrink:0; 
  background: linear-gradient(180deg, #11131C 0%, var(--bg-main) 100%); 
}
.logo-main { 
  font-family:'Oswald', sans-serif; 
  font-size: 5.5vw; 
  font-weight: 700; 
  color: var(--accent-gold); 
  letter-spacing: 3px; 
  text-transform:uppercase; 
  text-align:center; 
  line-height: 1.1;
  text-shadow: 0 4px 12px rgba(212, 175, 55, 0.15);
}
.logo-sub { 
  font-size: 2vw; 
  font-weight: 600; 
  color: var(--text-muted); 
  letter-spacing: 5px; 
  text-transform:uppercase; 
  text-align:center; 
  margin-top: 0.8vh; 
}

/* COL HEADERS */
.col-headers { 
  display:grid; 
  grid-template-columns: 0.8fr 1.25fr 0.2fr 1.25fr; 
  padding: 1.5vh 3vw; 
  border-bottom: 2px solid var(--border-color); 
  background: var(--bg-surface); 
  flex-shrink:0; 
  align-items: center;
}
.col-h { 
  font-family:'Oswald', sans-serif; 
  font-size: 4vw; 
  font-weight: 700; 
  letter-spacing: 2px; 
  text-transform:uppercase; 
  text-align:center; 
  line-height:1; 
}
.col-h:first-child { text-align:left; color: var(--text-muted); font-family: 'Inter', sans-serif; font-weight: 600; font-size: 3vw;}
.col-h.buy { color: var(--green-buy); }
.col-h.sell { color: var(--white-sell); }
.col-h-en { 
  font-size: 1.8vw; 
  font-weight: 500; 
  letter-spacing: 1px; 
  text-transform:uppercase; 
  text-align:center; 
  display:block; 
  margin-top: 2px;
  opacity: 0.8;
}

/* RATES TABLE */
.rates-table { flex:1; display:flex; flex-direction:column; padding:0 2vw; background: var(--bg-main); }
.rate-row { 
  display:grid; 
  grid-template-columns: 0.8fr 1.25fr 0.2fr 1.25fr; 
  align-items:center; 
  flex:1; 
  border-bottom: 1px solid rgba(45, 55, 72, 0.4); 
  padding: 0 1vw;
}
.rate-row:last-child { border-bottom:none; }
.rate-row:nth-child(even) { background: rgba(23, 25, 35, 0.4); }

.currency-cell { display:flex; align-items:center; }
.currency-badge {
  background: var(--bg-surface-alt);
  padding: 0.5vh 1.5vw;
  border-radius: 8px;
  border: 1px solid var(--border-color);
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
}
.currency-code { 
  font-family:'Oswald', sans-serif; 
  font-size: 6.5vw; 
  font-weight: 700; 
  color: #FFFFFF; 
  letter-spacing: 1px; 
  line-height:1; 
}

.rate-cell { text-align:center; }
.rate-val { 
  font-family:'Oswald', sans-serif; 
  font-size: 10vw; 
  font-weight: 700; 
  display:inline-block; 
  line-height:1; 
  letter-spacing: 0.1vw; 
}
.rate-val.buy { color: var(--green-buy); text-shadow: 0 0 20px rgba(0, 230, 118, 0.15); }
.rate-val.sell { color: var(--white-sell); text-shadow: 0 0 20px rgba(255, 255, 255, 0.1); }
.sep-dash { font-size: 4vw; color: var(--border-color); text-align:center; display:block; line-height:1; font-weight: 300; }

/* AMANET BAR */
.amanet-bar { 
  background: linear-gradient(90deg, #171923 0%, #1A202C 100%); 
  border-top: 3px solid var(--accent-gold); 
  flex-shrink:0; 
  padding: 2vh 4vw; 
  box-shadow: 0 -8px 24px rgba(0,0,0,0.4);
}
.amanet-title { 
  font-family:'Oswald', sans-serif; 
  font-size: 3.5vw; 
  font-weight: 700; 
  color: var(--accent-gold); 
  text-transform:uppercase; 
  letter-spacing: 4px; 
  text-align:center; 
  margin-bottom: 1.5vh; 
}
.amanet-grid {
  display: flex;
  justify-content: space-around;
  gap: 4vw;
}
.amanet-card {
  background: rgba(0, 0, 0, 0.2);
  border: 1px solid var(--border-color);
  padding: 1.5vh 3vw;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex: 1;
}
.amanet-type { font-weight: 700; font-size: 3.2vw; color: #E2E8F0; letter-spacing: 1px; }
.amanet-price { font-family:'Oswald', sans-serif; font-size: 4vw; font-weight: 700; color: var(--accent-gold); }

/* ADMIN SYSTEM */
.admin-btn { position:fixed; bottom:8px; right:8px; width:26px; height:26px; background:transparent; border:none; color:rgba(255,255,255,0.02); font-size:12px; cursor:pointer; z-index:999; user-select:none; }
#pwd-overlay { display:none; position:fixed; inset:0; background:rgba(11,12,16,0.96); backdrop-filter: blur(8px); z-index:2000; justify-content:center; align-items:center; }
#pwd-overlay.show { display:flex; }
.pwd-box { background: var(--bg-surface); border: 2px solid var(--accent-gold); border-radius:16px; padding:40px; text-align:center; width:360px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
.pwd-title { font-family:'Oswald', sans-serif; font-size:24px; color: var(--accent-gold); text-transform:uppercase; font-weight:700; margin-bottom:8px; letter-spacing: 1px; }
.pwd-sub { font-size:14px; color: var(--text-muted); margin-bottom:24px; }
.pwd-input { width:100%; background: var(--bg-main); border:2px solid var(--border-color); border-radius:10px; color:#FFFFFF; font-size:28px; padding:12px; text-align:center; letter-spacing:10px; margin-bottom:18px; transition: border-color 0.2s; }
.pwd-input:focus { outline:none; border-color: var(--accent-gold); }
.pwd-btn { width:100%; padding:14px; background: var(--accent-gold); border:none; border-radius:10px; color: var(--bg-main); font-weight:700; font-size:16px; letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition: background 0.2s; }
.pwd-btn:hover { background: var(--accent-gold-hover); }
.pwd-error { font-size:13px; color:#FF4D4D; margin-top:10px; font-weight:600; min-height:18px; }
.pwd-cancel { background:none; border:none; color: var(--text-muted); font-size:12px; letter-spacing:2px; text-transform:uppercase; cursor:pointer; margin-top:16px; font-weight:600; }

#admin { display:none; position:fixed; inset:0; background:rgba(5,6,8,0.96); backdrop-filter: blur(8px); z-index:1000; overflow-y:auto; padding:40px 16px; }
.admin-panel { max-width:640px; margin:0 auto; background: var(--bg-surface); border-radius:16px; border:1px solid var(--border-color); overflow:hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.6); }
.admin-header { background: #1A1D29; padding:20px 28px; border-bottom:1px solid var(--border-color); display:flex; justify-content:space-between; align-items:center; }
.admin-title { font-family:'Oswald', sans-serif; font-size:22px; font-weight:700; color: var(--accent-gold); letter-spacing:1px; }
.admin-close { background: var(--border-color); border:none; color:#FFFFFF; width:36px; height:36px; border-radius:50%; cursor:pointer; font-size:16px; font-weight:600; transition: background 0.2s; }
.admin-close:hover { background: #4A5568; }
.admin-body { padding:24px 28px; }
.admin-row-header { display:grid; grid-template-columns:1.5fr 1fr 1fr; gap:12px; padding:0 14px 10px 14px; }
.admin-col-label { font-size:12px; font-weight:700; letter-spacing:2px; text-transform:uppercase; text-align:center; color: var(--text-muted); }
.admin-col-label:first-child { text-align:left; color: var(--accent-gold); }
.admin-row { display:grid; grid-template-columns:1.5fr 1fr 1fr; gap:12px; align-items:center; margin-bottom:10px; padding:12px 14px; background: var(--bg-main); border-radius:10px; border:1px solid rgba(45, 55, 72, 0.5); }
.admin-currency-name { font-size:15px; font-weight:700; color:#FFFFFF; letter-spacing:0.5px; }
.admin-currency-name span { color: var(--text-muted); font-weight:400; font-size:13px; margin-left:6px; }
.admin-input { background: var(--bg-surface); border:1px solid var(--border-color); border-radius:8px; color:#FFFFFF; font-family:'Oswald', sans-serif; font-size:18px; font-weight:500; padding:10px; text-align:center; width:100%; transition: border-color 0.2s; }
.admin-input:focus { outline:none; border-color: var(--accent-gold); }
.admin-save-btn { width:100%; margin-top:20px; padding:16px; background: var(--accent-gold); border:none; border-radius:12px; color: var(--bg-main); font-weight:700; font-size:16px; letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition: background 0.2s; }
.admin-save-btn:hover { background: var(--accent-gold-hover); }
.admin-save-btn:disabled { opacity:0.4; }
.save-confirm { text-align:center; margin-top:14px; font-size:15px; letter-spacing:1px; opacity:0; transition:opacity 0.3s; min-height:22px; font-weight:700; }
.save-confirm.show { opacity:1; }
.save-confirm.ok { color: var(--green-buy); }
.save-confirm.err { color:#FF4D4D; }
</style>
</head>
<body>

<div id="pwd-overlay">
  <div class="pwd-box">
    <div class="pwd-title">Secured Access</div>
    <div class="pwd-sub">Introduceți codul de acces admin</div>
    <input type="password" class="pwd-input" id="pwd-input" placeholder="••••" maxlength="20">
    <button class="pwd-btn" onclick="checkPassword()">Autentificare</button>
    <div class="pwd-error" id="pwd-error"></div>
    <button class="pwd-cancel" onclick="closePwd()">Anulează</button>
  </div>
</div>

<div id="display">
  <div class="header">
    <div class="logo-main">SERMIRAV <span style="color:#FFFFFF">HERMES</span></div>
    <div class="logo-sub">SCHIMB VALUTAR &bull; BIJUTERIE &bull; AMANET</div>
  </div>

  <div class="col-headers">
    <div class="col-h">VALUTĂ</div>
    <div>
      <div class="col-h buy">CUMPĂRĂM</div>
      <div class="col-h-en" style="color: var(--green-buy)">(We buy)</div>
    </div>
    <div></div>
    <div>
      <div class="col-h sell">VINDEM</div>
      <div class="col-h-en" style="color: var(--white-sell)">(We sell)</div>
    </div>
  </div>

  <div class="rates-table" id="ratesTable"></div>

  <div class="amanet-bar">
    <div class="amanet-title">⚜ AMANET AUR</div>
    <div class="amanet-grid">
      <div class="amanet-card">
        <div class="amanet-type">AUR 14K</div>
        <div class="amanet-price">până la 310 LEI/G</div>
      </div>
      <div class="amanet-card">
        <div class="amanet-type">AUR 18K</div>
        <div class="amanet-price">până la 370 LEI/G</div>
      </div>
    </div>
  </div>
</div>

<button class="admin-btn" onclick="openPwd()">S</button>

<div id="admin">
  <div class="admin-panel">
    <div class="admin-header">
      <div class="admin-title">Panou Administrare Cursuri</div>
      <button class="admin-close" onclick="closeAdmin()">✕</button>
    </div>
    <div class="admin-body">
      <div class="admin-row-header">
        <div class="admin-col-label">Valută</div>
        <div class="admin-col-label" style="color: var(--green-buy)">Cumpărăm</div>
        <div class="admin-col-label" style="color:#FFFFFF">Vindem</div>
      </div>
      <div id="adminRows"></div>
      <button class="admin-save-btn" id="adminSaveBtn" onclick="saveRates()">✓ Salvează Cursurile</button>
      <div class="save-confirm" id="saveConfirm"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, get } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
const firebaseConfig = { apiKey:"AIzaSyD7K-y9cX-fPbpGOetaCTwe8G8gpMy-ML0", authDomain:"sermirav-exchange.firebaseapp.com", databaseURL:"https://sermirav-exchange-default-rtdb.europe-west1.firebasedatabase.app", projectId:"sermirav-exchange", storageBucket:"sermirav-exchange.firebasestorage.app", messagingSenderId:"913088674029", appId:"1:913088674029:web:8c3a77e3c5f5925a7fb4e4" };
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const ratesRef = ref(db, 'rates');
const ADMIN_PASSWORD = '2580';
const NAMES = { EUR:'Euro', USD:'Dolar American', GBP:'Lira Sterlina', CHF:'Franc Elvetian', CAD:'Dolar Canadian', AUD:'Dolar Australian', PLN:'Zlot Polonez', TRY:'Lira Turceasca', HUF:'Forint Maghiar' };
let CURRENCIES = [ {code:'EUR',buy:5.1260,sell:5.2100},{code:'USD',buy:4.3340,sell:4.4440},{code:'GBP',buy:5.8230,sell:6.0400},{code:'CHF',buy:5.5970,sell:5.7100},{code:'CAD',buy:3.0750,sell:3.3000},{code:'AUD',buy:2.7620,sell:3.1000},{code:'PLN',buy:1.1450,sell:1.2200},{code:'TRY',buy:0.0950,sell:0.1190},{code:'HUF',buy:0.0130,sell:0.0141} ];

async function fetchRates() { try { const snapshot = await get(ratesRef); const data = snapshot.val(); if (data && Array.isArray(data)) { data.forEach(r => { const idx = CURRENCIES.findIndex(c => c.code === r.code); if (idx >= 0) { CURRENCIES[idx].buy = r.buy; CURRENCIES[idx].sell = r.sell; const b = document.getElementById('buy-'+idx); const s = document.getElementById('sell-'+idx); if (b) b.textContent = r.buy.toFixed(4); if (s) s.textContent = r.sell.toFixed(4); } }); } } catch(e) {} }

let secretBuffer = '', secretTimer = null;
document.addEventListener('keydown', function(e) { if (e.target.tagName === 'INPUT') return; secretBuffer += e.key; if (secretTimer) clearTimeout(secretTimer); secretTimer = setTimeout(() => { secretBuffer = ''; }, 2000); if (secretBuffer.includes('2580')) { secretBuffer = ''; renderAdmin(); document.getElementById('admin').style.display = 'block'; } });

function renderDisplay() { const table = document.getElementById('ratesTable'); table.innerHTML = ''; CURRENCIES.forEach((c, i) => { const row = document.createElement('div'); row.className = 'rate-row'; row.innerHTML = `<div class="currency-cell"><div class="currency-badge"><div class="currency-code">${c.code}</div></div></div><div class="rate-cell"><span class="rate-val buy" id="buy-${i}">${c.buy.toFixed(4)}</span></div><div class="rate-cell"><span class="sep-dash">—</span></div><div class="rate-cell"><span class="rate-val sell" id="sell-${i}">${c.sell.toFixed(4)}</span></div>`; table.appendChild(row); }); }

function renderAdmin() { const container = document.getElementById('adminRows'); container.innerHTML = ''; CURRENCIES.forEach((c, i) => { const row = document.createElement('div'); row.className = 'admin-row'; row.innerHTML = `<div class="admin-currency-name">${c.code}<span>· ${NAMES[c.code]}</span></div><input type="number" class="admin-input" id="adm-buy-${i}" value="${c.buy.toFixed(4)}" step="0.0001" min="0"><input type="number" class="admin-input" id="adm-sell-${i}" value="${c.sell.toFixed(4)}" step="0.0001" min="0">`; container.appendChild(row); }); }

window.saveRates = async function() { const btn = document.getElementById('adminSaveBtn'); const confirmEl = document.getElementById('saveConfirm'); btn.disabled = true; btn.textContent = '⏳ Se salvează...'; const newRates = CURRENCIES.map((c, i) => ({ code: c.code, buy: parseFloat(document.getElementById('adm-buy-'+i).value)||c.buy, sell: parseFloat(document.getElementById('adm-sell-'+i).value)||c.sell })); try { await set(ratesRef, newRates); confirmEl.textContent = '✓ CURSURI SALVATE CU SUCCES!'; confirmEl.className = 'save-confirm show ok'; } catch(e) { confirmEl.textContent = '✕ Eroare: '+e.message; confirmEl.className = 'save-confirm show err'; } btn.disabled = false; btn.textContent = '✓ Salvează Cursurile'; setTimeout(()=>confirmEl.classList.remove('show'), 5000); };

window.openPwd = function() { document.getElementById('pwd-input').value=''; document.getElementById('pwd-error').textContent=''; document.getElementById('pwd-overlay').classList.add('show'); setTimeout(()=>document.getElementById('pwd-input').focus(), 100); };
window.closePwd = function() { document.getElementById('pwd-overlay').classList.remove('show'); };
window.checkPassword = function() { if (document.getElementById('pwd-input').value === ADMIN_PASSWORD) { window.closePwd(); renderAdmin(); document.getElementById('admin').style.display='block'; } else { document.getElementById('pwd-error').textContent='✕ Parolă incorectă'; document.getElementById('pwd-input').value=''; } };
window.closeAdmin = function() { document.getElementById('admin').style.display='none'; };
document.addEventListener('keydown', e => { if (e.key==='Enter' && document.getElementById('pwd-overlay').classList.contains('show')) window.checkPassword(); if (e.key==='Escape') { window.closePwd(); window.closeAdmin(); } });

renderDisplay();
fetchRates();
setInterval(fetchRates, 30000);
</script>
</body>
</html>
