<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SERMIRAV HERMES — Display</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0B0C10; font-family:'Oswald', sans-serif; color:#FFF; overflow:hidden; }
#display { width:100vw; height:100vh; padding: 2vh 2.5vw 0.5vh 2.5vw; display:flex; flex-direction:column; }
.header {
  text-align:center; padding-bottom:1.2vh; margin-bottom:1vh;
  border-bottom:3px solid #E8B84B;
}
.logo-name {
  font-size:9.2vw; font-weight:900; letter-spacing:3px;
  background:linear-gradient(90deg, #B8860B, #FFE9A8, #F2C660, #FFE9A8, #B8860B);
  background-size:200% auto;
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  animation: shimmerText 5s linear infinite;
  text-shadow:0 2px 8px rgba(232,184,75,0.3);
}
@keyframes shimmerText { 0%{background-position:0% center;} 100%{background-position:200% center;} }
.logo-sub { font-size:5.5vw; font-weight:900; letter-spacing:4px; color:#C9A24A; margin-top:0.6vh; text-transform:uppercase; }
.col-headers { display:grid; grid-template-columns: 15% 40% 45%; padding:0.6vh 0; margin-bottom:0.4vh; column-gap:1.5vw; }
.col-h { display:flex; flex-direction:column; align-items:center; }
.col-h-ro { font-size:4.6vw; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#C7CCD9; }
.col-h-en { font-size:2.6vw; font-weight:900; letter-spacing:1px; text-transform:uppercase; color:#7A8296; margin-top:0.2vh; }
.col-h:first-child { align-items:flex-start; }
.col-h:nth-child(2) { padding-left:1.5vw; }
.col-h:last-child { align-items:center; padding-right:5vw; }
#ratesTable { flex:1; display:flex; flex-direction:column; min-height:0; }
.rate-row { display:grid; grid-template-columns: 15% 40% 45%; align-items:center; flex:1; column-gap:1.5vw; }
.code-wrap { display:flex; align-items:center; }
.code {
  font-size:11vw; font-weight:900; display:inline-block; line-height:1; transform:scaleX(0.75); transform-origin:left center;
  background:linear-gradient(90deg, #B8860B, #FFE9A8, #F2C660, #FFE9A8, #B8860B);
  background-size:200% auto;
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  animation: shimmerText 5s linear infinite;
}
.val { font-size:16vw; font-weight:900; line-height:1; display:inline-block; transform:scaleX(0.78); }
.rate-row > .val.buy { text-align:center; padding-left:1.5vw; }
.rate-row > .val.sell { text-align:right; padding-right:5vw; }
.buy { color:#00FF66; }
.sell { color:#FFF; }
.gold-section { padding-top:1vh; margin-top:1vh; text-align:center; }
.gold-title-bar { display:flex; align-items:center; gap:2vw; margin-bottom:1.5vh; }
.gold-title-bar::before, .gold-title-bar::after { content:''; flex:1; height:2px; background:linear-gradient(90deg, transparent, #E8B84B, transparent); }
.gold-title-txt {
  font-size:7.5vw; font-weight:900; letter-spacing:3px; text-transform:uppercase; white-space:nowrap;
  background:linear-gradient(90deg, #B8860B, #FFE9A8, #F2C660, #FFE9A8, #B8860B);
  background-size:200% auto;
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  animation: shimmerText 5s linear infinite;
}
.gold-item {
  display:flex; align-items:center; justify-content:space-between;
  padding:2vh 4vw; margin-bottom:1.2vh; border-radius:14px;
  background:linear-gradient(135deg, #6B4E12 0%, #A67C1E 45%, #6B4E12 100%);
  border:2px solid #FFD98A;
  box-shadow: 0 4px 14px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.15);
  position:relative; overflow:hidden;
}
.gold-item::before {
  content:''; position:absolute; top:0; left:-60%; width:40%; height:100%;
  background:linear-gradient(120deg, transparent, rgba(255,255,255,0.25), transparent);
  transform:skewX(-20deg);
  animation: goldShine 4s ease-in-out infinite;
}
@keyframes goldShine { 0%{left:-60%;} 45%{left:130%;} 100%{left:130%;} }
.gold-txt { font-size:8vw; font-weight:900; color:#FFF6E0; letter-spacing:1px; text-transform:uppercase; z-index:1; }
.gold-val-wrap { text-align:right; z-index:1; display:flex; align-items:baseline; justify-content:flex-end; gap:1vw; }
.gold-upto { font-size:2.6vw; font-weight:700; color:#F2C660; letter-spacing:1px; text-transform:uppercase; }
.gold-val { font-size:8.5vw; font-weight:900; color:#FFF; letter-spacing:1px; line-height:1; text-shadow:0 2px 4px rgba(0,0,0,0.4); }
.gold-currency { font-size:4vw; font-weight:700; color:#F2C660; letter-spacing:1px; }
.loading-msg { color:#888E99; text-align:center; font-size:4vw; padding:4vh 0; }

/* Admin Panel */
#admin { display:none; position:fixed; inset:0; background:#050608; z-index:9999; padding:20px; overflow-y:auto; }
.admin-panel { max-width:600px; margin:0 auto; background:#14171E; border-radius:14px; border:2px solid #FFF; padding:20px; }
.admin-panel h2 { color:#E8B84B; text-align:center; margin-bottom:20px; }
.admin-row-header { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:6px; text-align:center; font-size:13px; letter-spacing:1px; color:#888E99; }
.admin-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:10px; align-items:center; }
.admin-row span { color:#E8B84B; font-weight:900; }
.admin-input { background:#0B0C10; border:2px solid #FFF; color:#E8B84B; font-size:20px; padding:10px; text-align:center; border-radius:6px; width:100%; font-family:'Oswald',sans-serif; }
.admin-input:focus { outline:none; border-color:#E8B84B; }
.gold-title { color:#E8B84B; margin:20px 0 10px; font-size:16px; letter-spacing:2px; text-align:center; }
.btn-save { width:100%; padding:18px; background:#FFF; border:none; color:#000; font-weight:900; font-size:18px; letter-spacing:2px; cursor:pointer; margin-top:16px; border-radius:8px; }
.btn-save:disabled { opacity:0.4; }
.btn-close { width:100%; margin-top:10px; padding:12px; background:none; border:1px solid #888E99; color:#888E99; border-radius:8px; cursor:pointer; font-family:'Oswald',sans-serif; letter-spacing:2px; }
.save-msg { text-align:center; margin-top:12px; font-weight:900; min-height:20px; }
.save-msg.ok { color:#00FF66; }
.save-msg.err { color:#FF4D4D; }
</style>
</head>
<body>

<div id="display">
    <div class="header">
        <div class="logo-name">SERMIRAV HERMES</div>
        <div class="logo-sub">Schimb Valutar</div>
    </div>
    <div class="col-headers">
        <div class="col-h"><span class="col-h-ro">Valută</span></div>
        <div class="col-h"><span class="col-h-ro">Cumpărăm</span><span class="col-h-en">We Buy</span></div>
        <div class="col-h"><span class="col-h-ro">Vindem</span><span class="col-h-en">We Sell</span></div>
    </div>
    <div id="ratesTable"><div class="loading-msg">Se încarcă...</div></div>
    <div class="gold-section">
        <div class="gold-title-bar"><span class="gold-title-txt">Amanet Aur</span></div>
        <div class="gold-item">
            <div class="gold-txt">Aur 14K</div>
            <div class="gold-val-wrap"><span class="gold-upto">până la</span><div class="gold-val"><span id="g14">--</span> <span class="gold-currency">LEI/G</span></div></div>
        </div>
        <div class="gold-item">
            <div class="gold-txt">Aur 18K</div>
            <div class="gold-val-wrap"><span class="gold-upto">până la</span><div class="gold-val"><span id="g18">--</span> <span class="gold-currency">LEI/G</span></div></div>
        </div>
    </div>
</div>

<div id="admin">
    <div class="admin-panel">
        <h2>PANOU ADMIN</h2>
        <div class="admin-row-header"><span>Valută</span><span>Cumpărăm</span><span>Vindem</span></div>
        <div id="adminRows"></div>
        <div class="gold-title">AUR (LEI/GRAM)</div>
        <div class="admin-row-header"><span>Tip</span><span>Preț "până la"</span><span></span></div>
        <div class="admin-row">
            <span>AUR 14K</span>
            <input type="number" id="adm-g14" class="admin-input" step="0.01">
            <span></span>
        </div>
        <div class="admin-row">
            <span>AUR 18K</span>
            <input type="number" id="adm-g18" class="admin-input" step="0.01">
            <span></span>
        </div>
        <button class="btn-save" id="saveBtn" onclick="saveAll()">✓ SALVEAZĂ TOT</button>
        <button class="btn-close" onclick="closeAdmin()">ÎNCHIDE</button>
        <div class="save-msg" id="saveMsg"></div>
    </div>
</div>

<button onclick="openAdmin()" style="position:fixed; bottom:0; right:0; opacity:0; width:60px; height:60px; border:none; background:none;"></button>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, get, set } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyD7K-y9cX-fPbpGOetaCTwe8G8gpMy-ML0",
  authDomain: "sermirav-exchange.firebaseapp.com",
  databaseURL: "https://sermirav-exchange-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "sermirav-exchange",
  storageBucket: "sermirav-exchange.firebasestorage.app",
  messagingSenderId: "913088674029",
  appId: "1:913088674029:web:8c3a77e3c5f5925a7fb4e4"
};
const db = getDatabase(initializeApp(firebaseConfig));
const hermesRef = ref(db, 'hermesSimplu');

// Valori implicite, folosite doar dacă în Firebase nu există încă nimic la nodul "hermesSimplu"
const DEFAULT_DATA = {
  rates: [
    { code:'EUR', buy:5.1260, sell:5.2100 },
    { code:'USD', buy:4.3340, sell:4.4440 },
    { code:'GBP', buy:5.8230, sell:6.0400 },
    { code:'CHF', buy:5.5970, sell:5.7100 },
    { code:'CAD', buy:3.0750, sell:3.3000 },
    { code:'AUD', buy:2.7620, sell:3.1000 },
    { code:'PLN', buy:1.1450, sell:1.2200 },
    { code:'TRY', buy:0.0950, sell:0.1190 },
    { code:'HUF', buy:0.0130, sell:0.0141 }
  ],
  gold: { k14: 310, k18: 370 }
};

window.openAdmin = () => {
  const p = prompt("Parolă:");
  if (p === '2580') {
    renderAdmin();
    document.getElementById('admin').style.display = 'block';
  } else if (p !== null) {
    alert('Parolă incorectă');
  }
};
window.closeAdmin = () => { document.getElementById('admin').style.display = 'none'; };

// Deschide adminul dacă utilizatorul tastează 2580 oriunde pe pagină (fără input focusat)
let secretBuffer = '', secretTimer = null;
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT') return;
  secretBuffer += e.key;
  if (secretTimer) clearTimeout(secretTimer);
  secretTimer = setTimeout(() => { secretBuffer = ''; }, 2000);
  if (secretBuffer.includes('2580')) {
    secretBuffer = '';
    renderAdmin();
    document.getElementById('admin').style.display = 'block';
  }
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') window.closeAdmin(); });

// Sursa de adevăr locală (mereu 9 valute + aur) - Firebase doar suprascrie ce găsește după cod,
// nu șterge/ascunde ce lipsește din baza de date.
let CURRENCIES = DEFAULT_DATA.rates.map(r => ({ ...r }));
let GOLD = { ...DEFAULT_DATA.gold };

function renderDisplay() {
  document.getElementById('ratesTable').innerHTML = CURRENCIES.map(r => `
    <div class="rate-row">
      <div class="code-wrap"><div class="code">${r.code}</div></div>
      <div class="val buy">${r.buy.toFixed(4)}</div>
      <div class="val sell">${r.sell.toFixed(4)}</div>
    </div>
  `).join('');
  document.getElementById('g14').innerText = GOLD.k14;
  document.getElementById('g18').innerText = GOLD.k18;
}

function renderAdmin() {
  document.getElementById('adminRows').innerHTML = CURRENCIES.map((r, i) => `
    <div class="admin-row">
      <span>${r.code}</span>
      <input type="number" id="buy-${i}" class="admin-input" value="${r.buy}" step="0.0001">
      <input type="number" id="sell-${i}" class="admin-input" value="${r.sell}" step="0.0001">
    </div>
  `).join('');
  document.getElementById('adm-g14').value = GOLD.k14;
  document.getElementById('adm-g18').value = GOLD.k18;
}

async function load() {
  try {
    const snap = await get(hermesRef);
    const d = snap.val();
    if (d && Array.isArray(d.rates)) {
      d.rates.forEach(r => {
        const idx = CURRENCIES.findIndex(c => c.code === r.code);
        if (idx >= 0) { CURRENCIES[idx].buy = r.buy; CURRENCIES[idx].sell = r.sell; }
      });
    }
    if (d && d.gold) {
      if (typeof d.gold.k14 === 'number') GOLD.k14 = d.gold.k14;
      if (typeof d.gold.k18 === 'number') GOLD.k18 = d.gold.k18;
    }
    if (!d) {
      // Nimic salvat încă -> scriem valorile implicite complete (9 valute + aur)
      await set(hermesRef, { rates: CURRENCIES, gold: GOLD });
    }
    renderDisplay();
    renderAdmin();
  } catch (e) {
    document.getElementById('ratesTable').innerHTML = `<div class="loading-msg">Eroare la încărcare: ${e.message}</div>`;
  }
}

window.saveAll = async () => {
  const btn = document.getElementById('saveBtn');
  const msg = document.getElementById('saveMsg');
  btn.disabled = true;
  btn.textContent = '⏳ Se salvează...';

  CURRENCIES = CURRENCIES.map((r, i) => ({
    code: r.code,
    buy: parseFloat(document.getElementById('buy-' + i).value) || r.buy,
    sell: parseFloat(document.getElementById('sell-' + i).value) || r.sell
  }));
  GOLD = {
    k14: parseFloat(document.getElementById('adm-g14').value) || GOLD.k14,
    k18: parseFloat(document.getElementById('adm-g18').value) || GOLD.k18
  };

  try {
    await set(hermesRef, { rates: CURRENCIES, gold: GOLD });
    renderDisplay();
    msg.textContent = '✓ Salvat cu succes!';
    msg.className = 'save-msg ok';
  } catch (e) {
    msg.textContent = '✕ Eroare: ' + e.message;
    msg.className = 'save-msg err';
  }
  btn.disabled = false;
  btn.textContent = '✓ SALVEAZĂ TOT';
  setTimeout(() => { msg.textContent = ''; msg.className = 'save-msg'; }, 4000);
};

load();
setInterval(load, 30000); // reîmprospătare automată din Firebase la fiecare 30s
</script>
</body>
</html>
